<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>Quản Lý Sinh Viên</h1>

        <button id="openFormBtn">
            + Thêm Sinh Viên
        </button>
    </header>

    <!-- THỐNG KÊ -->
    <section class="statistics">
        <div>
            Tổng sinh viên:
            <span id="totalStudents">0</span>
        </div>

        <div>
            Điểm trung bình:
            <span id="averageScore">0</span>
        </div>
    </section>

    <!-- THÔNG BÁO -->
    <div id="messageBox"></div>

    <!-- BẢNG SINH VIÊN -->
    <section class="table-section">

        <table>
            <thead>
                <tr>
                    <th>Mã SV</th>
                    <th>Họ tên</th>
                    <th>Ngày sinh</th>
                    <th>Lớp</th>
                    <th>Điểm TB</th>
                    <th>Email</th>
                    <th>Hành động</th>
                </tr>
            </thead>

            <tbody id="studentTableBody">

                <!-- Dữ liệu sẽ render bằng JS -->

            </tbody>
        </table>

    </section>

    <!-- MODAL -->
    <div class="modal hidden" id="studentModal">

        <div class="modal-content">

            <h2 id="formTitle">
                Thêm Sinh Viên
            </h2>

            <form id="studentForm">

                <input
                    type="text"
                    id="studentId"
                    placeholder="Mã sinh viên"
                >

                <input
                    type="text"
                    id="fullName"
                    placeholder="Họ và tên"
                >

                <input
                    type="date"
                    id="birthDate"
                >

                <input
                    type="text"
                    id="className"
                    placeholder="Lớp học"
                >

                <input
                    type="number"
                    id="score"
                    placeholder="Điểm trung bình"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                >

                <div class="form-buttons">

                    <button type="submit">
                        Lưu
                    </button>

                    <button
                        type="button"
                        id="closeFormBtn"
                    >
                        Hủy
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
